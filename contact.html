<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contáctanos para más información sobre gastronomía coreana y contenido del sitio web.">
    <link rel="stylesheet" href="css/contact.css">
    <title>Contacto</title>
</head>
<body>
    <header>
        <nav>
            <a class="logo" href="index.html"><img src="images/incons/Logo1.webp" alt="logo" title="Logo"></a>
            <ul>
                <li><a href="index.html">Menu</a></li>
                <li><a href="plates.html">Platos</a></li>
                <li><a href="recipe.html">Recetas</a></li>
                <li><a href="#">Contacto</a></li>
                <li><a href="" title="Ingles/Espanol">[EN/ES]</a></li>
            </ul>
        </nav>
    </header>
<main>
    <section>
        <h1>CONTACTANOS!!</h1>
        <article class="contact-container">
            <div class="contact-content">
                <form action="#" aria-labelledby="titulo-contacto">
                    
                    <div>
                        <label for="nombre">Nombre:</label>
                        <input 
                            type="text" 
                            id="nombre" 
                            name="username" 
                            placeholder="Escribe tu nombre aqui!" 
                            required
                        />
                    </div>
                    <div>
                        <label for="correo">Correo:</label>
                        <input 
                            type="email" 
                            id="correo" 
                            name="email" 
                            placeholder="Escribe tu correo aqui!"
                            required
                        />
                    </div>
                    <div>
                        <label for="mensaje">Mensaje:</label>
                        <textarea 
                            name="message" 
                            id="mensaje"
                            placeholder="Escribe tu mensaje aqui..."
                            required
                        ></textarea>
                    </div>
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </article>
    </section>
</main>
    <footer>
        <section>
            <h2>Nuestras Redes!!!</h2>
            <div class="social-icons">
                <ul>
                    <li><a href="https://facebook.com" target="_blank">
                            <img src="images/incons/Facebook.webp" alt="Facebook">
                        </a></li>
                    <li><a href="https://instagram.com" target="_blank">
                            <img src="images/incons/Insta.webp" alt="Instagram">
                        </a></li>
                    <li><a href="https://youtube.com" target="_blank">
                            <img src="images/incons/youtube.webp" alt="YouTube">
                        </a></li>
                    <li><a href="https://google.com" target="_blank">
                            <img src="images/incons/mail.webp" alt="gmail">
                        </a></li>
                </ul>
            </div>
        </section>
    </footer>
</html>
